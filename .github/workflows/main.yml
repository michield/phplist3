# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the action will run. 
on: [push]

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-18.04

    strategy:
      matrix:        
        php-versions: ['7.4']
        #php-versions: ['5.6', '7.0', '7.1', '7.2', '7.3', '7.4', '8.0']

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v2

      - name: Set up PHP ${{ matrix.php-versions }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}

     # Runs a set of commands using the runners shell
      - name: Run tests
        run: |
          cd $GITHUB_WORKSPACE
          sudo apt update
          #  sudo apt install -y composer php-mbstring php-curl php-mysql mariadb-client mariadb-server php-xml php-zip
          composer install
          sudo systemctl start mysql.service
          sudo mysql -proot  -e 'drop database if exists phplistdb'
          sudo mysqladmin -proot create phplistdb
          sudo mysql -proot -e 'grant all on phplistdb.* to phplist@"%" identified by "phplist"'
          cp -fv tests/ci/config.php public_html/lists/config/config.php
          php -v
          ./bin/start-selenium > /dev/null 2>&1 &
          sleep 5
          sudo php -S 0.0.0.0:80 -t public_html > /dev/null 2>&1 &
          mkdir output
          cd tests
          ../vendor/bin/behat -n -fprogress -p chrome --strict --tags=@initialise


