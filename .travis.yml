language: php

cache:
    directories:
      - "$HOME/.composer/cache"

matrix:
    include:
        - php: '5.4'
          env: BROWSER=goutte
        - php: '5.5'
          env: BROWSER=goutte
        - php: '5.6'
          env: BROWSER=goutte
        - php: '7.0'
          env: BROWSER=goutte
        - php: '7.1'
          env: BROWSER=goutte
        - php: '7.1'
          env: BROWSER=chrome
        - php: '7.2'
          env: BROWSER=goutte
        - php: '7.2'
          env: BROWSER=chrome

notifications:
  slack:
    rooms:
      secure: "LegKwsGSAQDcqUGA8Jg90XUWfhnmho5U+RXKpuRfAT4L5Z8j761AVGIwTrUWw8gnxeGccr3smTWahm+GYuwMvg8YDxcygPuVn3U+fus0qgqAnfkQLmMl4vSdkZfO1GTc7YkyLAJcmwdDeUgXr94gQ4qvmsTSk8E0gzIstdfFiOU="
  on_success: change
  on_failure: always

before_install:

notifications:
  irc: chat.freenode.net#phplist
  slack:
    rooms:
      secure: 
    on_success: change
    on_failure: always
before_script:
- sudo apt-get update > /dev/null
- sudo apt-get install -y --force-yes apache2 libapache2-mod-php5 php5-curl php5-mysql
  php5-intl
- sudo sed -i -e "s,DocumentRoot.*,DocumentRoot $(pwd)/public_html,g" /etc/apache2/sites-available/000-default.conf
- sudo sed -i -e "/DocumentRoot/i\ServerName phplist.dev" /etc/apache2/sites-available/000-default.conf
- sudo sed -i -e "/DocumentRoot/i\DirectoryIndex index.php" /etc/apache2/sites-available/000-default.conf
- sudo sed -i -e 's,Require all denied,Require all granted,g' /etc/apache2/apache2.conf
- sudo cat /etc/apache2/sites-available/000-default.conf
- sudo cat /etc/apache2/apache2.conf
- echo "127.0.0.1 phplist.dev" | sudo tee -a /etc/hosts
- sudo /etc/init.d/apache2 restart
- sudo ls -l /home
- cp -f tests/travis-ci/behat.yml behat.yml
- cp -f tests/travis-ci/config.php public_html/lists/config/config.php
- composer self-update
- composer install --prefer-dist
- cd vendor/bin && ln -s ../njoannidi/php-lint-bash/phpLint && cd ../../
- ls -l vendor/bin
- cd public_html/lists/admin/ui/ && wget https://github.com/phpList/phplist-ui-bootlist/archive/master.tar.gz
  && tar -xzf master.tar.gz && mv phplist-ui-bootlist-master phplist-ui-bootlist &&
  rm master.tar.gz && cd ../../../../
- mysql -e 'SET GLOBAL wait_timeout = 5400;'
- mysql -e 'create database phplistdb;'
script:
  # check syntax
  - ./vendor/bin/phpLint ./public_html

  # run setup feature first to create database
  - ./vendor/bin/behat -fprogress -p $BROWSER --strict --tags=@first-run

  # run all feature except @first-run
  - ./vendor/bin/behat -fprogress -p $BROWSER --strict --tags="~@first-run && ~@wip"
addons:
  chrome: stable

after_failure:
  - IMGUR_CLIENT_ID=bec050c54e1bb52 ./bin/imgur-uploader.sh build/screenshot/*.png
