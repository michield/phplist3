# Configuration file for running the test suite. Results will be at https://travis-ci.org/phpList/phplist3
# whitelist
language: php
php:
  - 5.6

dist: trusty
sudo: false

services:
  - mysql

notifications:
  irc: "chat.freenode.net#phplist"
  webhooks: https://chat.phplist.com/hooks/6ynms7t39bgfmbah4amg6qo1sh
  slack: phplist:wDLojEEoZ0Sw0iTqpRzw6wsd
#    urls:
#      - $NOTIFY_URL
#      - https://chat.phplist.com/hooks/6ynms7t39bgfmbah4amg6qo1sh

before_script:
  - sudo apt-get update > /dev/null
  - sudo apt-get install -y --force-yes apache2 libapache2-mod-php5 php5-curl php5-mysql php5-intl
  - sudo sed -i -e "s,DocumentRoot.*,DocumentRoot $(pwd)/public_html,g" /etc/apache2/sites-available/000-default.conf
  - sudo sed -i -e "/DocumentRoot/i\ServerName phplist.dev" /etc/apache2/sites-available/000-default.conf
  - sudo sed -i -e "/DocumentRoot/i\DirectoryIndex index.php" /etc/apache2/sites-available/000-default.conf
#  - sudo sed -i -e '/DocumentRoot/i\
#     <Directory \/>\
#        Options Indexes FollowSymLinks\
#        AllowOverride None\
#        Require all granted\
#     <\/Directory>\
#     ' /etc/apache2/sites-available/000-default.conf
  - sudo sed -i -e 's,Require all denied,Require all granted,g' /etc/apache2/apache2.conf
  - sudo cat /etc/apache2/sites-available/000-default.conf
  - sudo cat /etc/apache2/apache2.conf
  - echo "127.0.0.1 phplist.dev" | sudo tee -a /etc/hosts
  - sudo /etc/init.d/apache2 restart
  - sudo ls -l /home
  # Configure Behat
  - cp -f tests/travis-ci/behat.yml behat.yml
  - cp -f tests/travis-ci/config.php public_html/lists/config/config.php
  # Setup composer
  - composer self-update
  - composer install --prefer-dist
  - cd vendor/bin && ln -s ../njoannidi/php-lint-bash/phpLint && cd ../../
  - ls -l vendor/bin
  # Install Trevelin theme
  - cd public_html/lists/admin/ui/ && wget https://github.com/phpList/phplist-ui-bootlist/archive/master.tar.gz && tar -xzf master.tar.gz && mv phplist-ui-bootlist-master phplist-ui-bootlist && rm master.tar.gz && cd ../../../../

  # Set MySQL configuration and create the database.
  - mysql -e 'SET GLOBAL wait_timeout = 5400;'
  - mysql -e 'create database phplistdb;'

script:
#  - vendor/bin/phpLint ./public_html
  - vendor/bin/behat

after_failure:
  - echo "Failures detected. Outputing additional logs:"
  - ls -l /etc/apache2/sites-available/
  - ls -l /home/travis/build/
  - ls -l /home/travis/build/michield
  - ls -l /home/travis/build/michield/phplist3
  - sudo cat /etc/apache2/apache2.conf
  - sudo cat /etc/apache2/sites-available/000-default.conf
  - sudo cat /var/log/apache2/error.log
  - sudo cat /var/log/mysql/error.log
