# behat.yml
default:
  suites:
    default:
      paths: 
        - ./features
      contexts: 
        - FeatureContext 
  extensions:
    Behat\MinkExtension:
      show_cmd: 'cp %s ./output/lastResponse.html' #'cat %s'
      base_url: "http://test.phplist.com/"
      sessions:
        default:
          selenium2:
            browser: "firefox"
            wd_host: http://firefox-server:4444/wd/hub
